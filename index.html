<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume ATS Tailor</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #22c55e;
      --secondary: #3b82f6;
      --hover: #1e293b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e1b4b);
      color: var(--text);
      padding: 24px;
    }

    .container {
      width: min(680px, 100%);
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3.5vw, 2.3rem);
      letter-spacing: 0.3px;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      min-width: 180px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.2s ease, background 0.2s ease;
      color: #fff;
    }

    button:focus-visible {
      outline: 3px solid #f8fafc;
      outline-offset: 2px;
    }

    .btn-cv {
      background: var(--primary);
    }

    .btn-jobs {
      background: var(--secondary);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.07);
    }

    .status {
      margin-top: 22px;
      color: #cbd5e1;
      font-size: 0.96rem;
      min-height: 1.3em;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Resume ATS Tailor</h1>
    <p>
      Choose an action to get started with your career workflow.
    </p>

    <div class="actions">
      <button class="btn-cv" id="generateCvBtn">Generate CV</button>
      <button class="btn-jobs" id="findJobsBtn">Find Jobs</button>
    </div>

    <div class="status" id="statusText"></div>
  </main>

  <script>
    const statusText = document.getElementById('statusText');

    document.getElementById('generateCvBtn').addEventListener('click', () => {
      statusText.textContent = 'Generate CV clicked. Connect this button to your CV generation flow.';
    });

    document.getElementById('findJobsBtn').addEventListener('click', () => {
      statusText.textContent = 'Find Jobs clicked. Connect this button to your job search flow.';
    });
  </script>
</body>
</html>
